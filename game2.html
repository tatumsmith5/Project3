<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Game 2</title>
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="apple-touch-icon" href="appicon.png">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="game2.css">
</head>
<body>
  <div class="game-wrapper">
    <a href="index.html" class="nav-home-btn nav-btn-html">
      <svg viewBox="0 0 33.92 41.8" xmlns="http://www.w3.org/2000/svg" width="34" height="42">
        <circle cx="16.96" cy="20.9" r="11.18" fill="none" stroke="#231f20" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <polyline points="9.71 23.07 16.66 13.85 24.21 23.07" fill="none" stroke="#231f20" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="13.78" y1="22.25" x2="13.78" y2="27.3" fill="none" stroke="#231f20" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="20.14" y1="22.25" x2="20.14" y2="27.3" fill="none" stroke="#231f20" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
    <button class="nav-refresh-btn nav-btn-html" id="nav-refresh">
      <svg viewBox="0 0 33.92 41.8" xmlns="http://www.w3.org/2000/svg" width="34" height="42">
        <circle cx="16.96" cy="20.9" r="11.18" fill="none" stroke="#231f20" stroke-width="2" stroke-linecap="round" stroke-miterlimit="10"/>
        <line x1="8.84" y1="21.59" x2="18.71" y2="21.59" fill="none" stroke="#231f20" stroke-width="1.63" stroke-linecap="round" stroke-linejoin="round"/>
        <polyline points="19.12 15.41 25.08 21.37 20.06 26.38" fill="none" stroke="#231f20" stroke-width="1.63" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <div class="puzzle-container" id="puzzle-container"></div>
    <p class="instruction">complete the puzzle!</p>
    <p class="complete-msg" id="complete-msg">you did it!</p>
  </div>
  <script src="game2.js"></script>
  <script>
  (function() {
    var btn = document.getElementById('nav-refresh');
    if (!btn) return;
    btn.addEventListener('click', function(e) {
      e.preventDefault();
      var all = [1,2,3,4,5,6,7];
      var m = location.pathname.match(/game(\d+)/);
      var cur = m ? parseInt(m[1]) : 0;
      var choices = all.filter(function(n) { return n !== cur; });
      location.href = 'game' + choices[Math.floor(Math.random() * choices.length)] + '.html';
    });
  })();
  </script>
</body>
</html>
